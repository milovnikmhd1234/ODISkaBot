<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj Discord Bot</title>
    <style>
        /* 1. Definice fontů */
        @font-face {
            font-family: 'MatrixItalic';
            src: url('fonts/DotMatrix-Italic.otf') format('opentype');
        }
        @font-face {
            font-family: 'MatrixExpanded';
            src: url('fonts/DotMatrix-ExpandedItalic.ttf') format('truetype');
        }

        body {
            background-color: #1a1a1a;
            color: #FF9900; /* Barva displeje */
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #000;
            padding: 40px;
            border: 2px solid #333;
            text-align: center;
            max-width: 500px;
        }

        /* Aplikace fontu Italic */
        h1, .features li {
            font-family: 'MatrixItalic', sans-serif;
            text-transform: uppercase;
        }

        h1 { font-size: 50px; margin-bottom: 20px; }

        .features {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 30px auto;
            width: fit-content;
        }

        .features li {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Tlačítko - Aplikace fontu ExpandedItalic */
        .btn-add {
            font-family: 'MatrixExpanded', sans-serif;
            background-color: #FF9900;
            color: black;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 28px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-add:hover { background-color: #cc7a00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>LINKA BOT</h1>
        
        <ul class="features">
            <li>> Vyhledávání spojů v ODIS</li>
            <li>> Ban, kick, mute</li>
            <li>> Leaderboard</li>
            <li>> Starboard</li>
            <li>> Rank systém (automatické role)</li>
        </ul>

        <a href="https://discord.com/oauth2/authorize?client_id=1520851384961077470&permissions=8&integration_type=0&scope=applications.commands+bot" class="btn-add">
            PŘIDAT NA SERVER
        </a>
    </div>

</body>
</html>
