<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODISka Discord Bot</title>
    <style>
        /* Definice fontů */
        @font-face {
            font-family: 'MatrixItalic';
            src: url('fonts/DotMatrix-Italic.otf') format('opentype');
        }
        @font-face {
            font-family: 'MatrixExpanded';
            src: url('fonts/DotMatrix-ExpandedItalic.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            color: #FF9900;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #000;
            padding: 40px;
            border: 2px solid #333;
            text-align: center;
            max-width: 600px; /* Trochu širší, aby se text vešel */
        }

        h1, .features li {
            font-family: 'MatrixItalic', sans-serif;
            text-transform: uppercase;
        }

        h1 { font-size: 50px; margin-bottom: 20px; }

        .features {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 30px auto;
            width: fit-content;
        }

        .features li {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Obdélníkový panel pro tlačítko */
        .btn-panel {
            font-family: 'MatrixExpanded', sans-serif;
            display: inline-block;
            border: 3px solid #FF9900; /* Oranžový rám jako displej */
            background-color: transparent;
            color: #FF9900;
            padding: 20px 40px;
            text-decoration: none;
            font-size: 26px;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-panel:hover {
            background-color: #FF9900; /* Převrácení barev při najetí */
            color: #000000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ODISka Discord Bot</h1>
        
        <ul class="features">
            <li>> Vyhledavani spoju v ODIS</li>
            <li>> Ban, kick, mute</li>
            <li>> Leaderboard</li>
            <li>> Starboard</li>
            <li>> Rank system (automaticke role)</li>
        </ul>

        <a href="https://discord.com/oauth2/authorize?client_id=1520851384961077470" class="btn-panel">
            DOVEZ HO NA VLASTNI SERVER
        </a>
    </div>

</body>
</html>
